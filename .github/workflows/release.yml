name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the build to (must already exist as a release)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            "tag=${{ github.event.release.tag_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "tag=${{ github.event.inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Stamp version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $ver = $tag.TrimStart("v")
          if ($ver -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { $ver = "1.0.0" }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Using assembly version: $ver"

      - name: Publish (self-contained single-file)
        shell: pwsh
        run: |
          dotnet publish ElsTracker/ElsTracker.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 `
            -p:FileVersion=${{ steps.version.outputs.version }}.0 `
            -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElsTracker-win-x64
          path: publish/ElsTracker.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" `
            "publish/ElsTracker.exe" `
            --clobber
