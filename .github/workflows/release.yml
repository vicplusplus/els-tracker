name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the build to (must already exist as a release)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            "tag=${{ github.event.release.tag_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "tag=${{ github.event.inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Stamp version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $ver = $tag.TrimStart("v")
          if ($ver -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { $ver = "1.0.0" }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Using assembly version: $ver"

      - name: Publish (self-contained single-file)
        shell: pwsh
        run: |
          dotnet publish ElsTracker/ElsTracker.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 `
            -p:FileVersion=${{ steps.version.outputs.version }}.0 `
            -o publish

      - name: Check signing secrets
        id: signing
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrEmpty($env:SIGNING_CERT_BASE64)) {
            Write-Host "SIGNING_CERT_BASE64 not set — skipping signing."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Sign ElsTracker.exe
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ secrets.SIGNING_TIMESTAMP_URL }}
        run: |
          $ts = if ([string]::IsNullOrEmpty($env:SIGNING_TIMESTAMP_URL)) {
            "http://timestamp.digicert.com"
          } else { $env:SIGNING_TIMESTAMP_URL }

          $pfx = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_CERT_BASE64))

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
                        -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
                      Sort-Object FullName -Descending |
                      Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found on runner." }
          Write-Host "Using signtool: $signtool"

          & $signtool sign `
            /f $pfx `
            /p $env:SIGNING_CERT_PASSWORD `
            /tr $ts /td sha256 /fd sha256 `
            /d "Elsword Weekly Tracker" `
            publish/ElsTracker.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed." }

          & $signtool verify /pa /v publish/ElsTracker.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool verify failed." }

          Remove-Item $pfx -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElsTracker-win-x64
          path: publish/ElsTracker.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" `
            "publish/ElsTracker.exe" `
            --clobber
